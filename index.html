<style>
:root{--cyan:#00e5ff;--neon:#00ff41;--bg:#03050a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#b0bec5;font-family:'Courier New',Consolas,monospace;font-size:14px;line-height:1.8}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(0,229,255,.03) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(0,255,65,.02) 0%,transparent 50%);pointer-events:none;z-index:0}

.row .date{color:var(--cyan);width:140px;letter-spacing:1px}
.row .title{flex:1}
.row a{color:#78909c;text-decoration:none;transition:color .2s}
.row a:hover{color:var(--neon);text-shadow:0 0 6px rgba(0,255,65,.3)}
.row .tag{display:inline-block;font-size:10px;border:1px solid rgba(0,255,65,.25);padding:1px 7px;color:var(--neon);letter-spacing:1px}
.footer{text-align:center;margin-top:30px;color:#37474f;font-size:11px}
